name: CI/CD - Build e Publish Docker

on:
  push:
    branches: [ "main" ]

jobs:
  # 1. Fase de Testes (CI)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Executar testes com Maven
        run: mvn test

  # 2. Fase de Build e Publicação no Docker Hub (CD)
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          push: true
          # Substitua pelo seu nome de usuário correto e o nome do seu repositório no Docker Hub
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/passeio-cavalo:latest